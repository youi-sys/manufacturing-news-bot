  - name: "野村総合研究所（NRI）レポート"
    type: gnews
    query: "site:nri.com 製造業"
    region: domestic
    category: "シンクタンクインサイト"
    keywords: []

  - name: "三菱UFJリサーチ&コンサルティング レポート"
    type: gnews
    query: "site:murc.jp 製造業"
    region: domestic
    category: "シンクタンクインサイト"
    keywords: []

  - name: "日本総合研究所（JRI）レポート"
    type: gnews
    query: "site:jri.com 製造業"
    region: domestic
    category: "シンクタンクインサイト"
    keywords: []

  # ---------- 全般：一次情報に限らないトレンド補足枠 ----------
  # 一次情報ドメインに縛られず「スマートファクトリー」等のキーワードで
  # 幅広く拾いたい場合の補助枠。ノイズが増える場合はコメントアウトしてください。
  - name: "製造業DX・スマートファクトリー 関連ニュース（国内）"
    type: gnews
    query: "製造業 (スマートファクトリー OR DX OR デジタルツイン OR 生成AI活用)"
    region: domestic
    category: "トレンド全般"
    keywords: []

  - name: "Manufacturing Innovation News (Global)"
    type: gnews
    query: "manufacturing (\"smart factory\" OR \"Industry 4.0\" OR \"digital twin\" OR automation)"
    region: overseas
    category: "トレンド全般"
    keywords: []
