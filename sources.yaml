    region: overseas
    category: "コンサルインサイト"
    keywords: []

  - name: "Accenture Insights（製造業関連）"
    type: gnews
    query: "site:accenture.com (manufacturing OR industrial OR \"supply chain\")"
    region: overseas
    category: "コンサルインサイト"
    keywords: []

  - name: "Roland Berger Insights（製造業関連）"
    type: gnews
    query: "site:rolandberger.com (manufacturing OR industrial OR \"supply chain\")"
    region: overseas
    category: "コンサルインサイト"
    keywords: []

  - name: "デロイト トーマツ／PwC Japan／アクセンチュア日本 インサイト"
    type: gnews
    query: "site:deloitte.com/jp OR site:pwc.com/jp OR site:accenture.com/jp 製造業"
