# =========================================================
# 収集対象ソース設定ファイル
# =========================================================
# type: "rss"   -> そのままRSS/Atomフィードを取得
# type: "gnews" -> Google News RSS検索を使い、query に指定した
#                  検索式（site:で一次情報ドメインを指定可能）で
#                  ニュースを収集します。
#
# 自由に追加・削除・コメントアウトして調整してください。
# =========================================================

sources:

  # ---------- 国内：官公庁・団体（公式一次情報） ----------
  - name: "経済産業省 ニュースリリース"
    type: rss
    url: "https://www.meti.go.jp/ml_index_release_atom.xml"
    region: domestic
    category: "政策・産業全般"
    # 官公庁フィードは製造業以外の話題も多いのでキーワードで絞り込む
    keywords:
      - "製造業"
      - "工場"
      - "スマートファクトリー"
      - "ロボット"
      - "DX"
      - "半導体"
      - "サプライチェーン"
      - "生産性"
      - "自動車"
      - "脱炭素"
      - "カーボンニュートラル"

  # ---------- 国内：主要製造業（一次情報ドメインに限定したニュース検索） ----------
  - name: "トヨタ自動車 公式発表"
    type: gnews
    query: "site:global.toyota OR site:toyota.jp"
    region: domestic
    category: "自動車"
    keywords: []   # 企業公式ドメイン限定のため追加の絞り込みは不要

  - name: "日産自動車 公式発表"
    type: gnews
    query: "site:nissan-global.com"
    region: domestic
    category: "自動車"
    keywords: []

  - name: "パナソニック ホールディングス 公式発表"
    type: gnews
    query: "site:panasonic.com OR site:panasonic.co.jp"
    region: domestic
    category: "電機"
    keywords: []

  - name: "日立製作所 公式発表"
    type: gnews
    query: "site:hitachi.co.jp OR site:hitachi.com"
    region: domestic
    category: "電機・インフラ"
    keywords: []

  - name: "デンソー 公式発表"
    type: gnews
    query: "site:denso.com"
    region: domestic
    category: "自動車部品"
    keywords: []

  - name: "ファナック／安川電機 公式発表（産業用ロボット）"
    type: gnews
    query: "site:fanuc.co.jp OR site:yaskawa.co.jp"
    region: domestic
    category: "産業用ロボット"
    keywords: []

  # ---------- 海外：主要製造業（一次情報ドメインに限定したニュース検索） ----------
  - name: "Siemens Press"
    type: gnews
    query: "site:press.siemens.com OR site:new.siemens.com"
    region: overseas
    category: "電機・オートメーション"
    keywords: []

  - name: "GE / GE Vernova Press"
    type: gnews
    query: "site:ge.com OR site:gevernova.com"
    region: overseas
    category: "重工業・エネルギー"
    keywords: []

  - name: "Bosch Press"
    type: gnews
    query: "site:bosch.com OR site:bosch-presse.de"
    region: overseas
    category: "自動車部品・電機"
    keywords: []

  - name: "Volkswagen / BMW Press"
    type: gnews
    query: "site:volkswagen-newsroom.com OR site:press.bmwgroup.com"
    region: overseas
    category: "自動車"
    keywords: []

  # ---------- コンサルティングファーム／シンクタンクのインサイト ----------
  # 不定期更新のため、頻度は気にせず全件チェックしてOK（cronで毎日巡回すれば十分）

  - name: "McKinsey Insights & Publications（公式RSS）"
    type: rss
    url: "https://www.mckinsey.com/insights/rss"
    region: overseas
    category: "コンサルインサイト"
    keywords:
      - "manufactur"
      - "industrial"
      - "factory"
      - "supply chain"
      - "operations"
      - "automotive"
      - "semiconductor"
      - "automation"

  - name: "BCG Insights（製造業関連）"
    type: gnews
    query: "site:bcg.com (manufacturing OR industrial OR \"supply chain\" OR factory)"
    region: overseas
    category: "コンサルインサイト"
    keywords: []

  - name: "Bain Insights（製造業関連）"
    type: gnews
